<table class="table-bordered table-striped text-wrap">
    <thead>
        <tr class="align-middle text-center small">
            <th>First name</th>
            <th>Last name</th>
            <th>Email</th>
        </tr>
    </thead>
    <tbody>
        @for (row of data; track row) {
        <tr class="align-middle">
            <td>{{row.firstname}}</td>
            <td>{{row.lastname}}</td>
            <td>{{row.email}}</td>
        </tr>
        }   
    </tbody>
</table>
